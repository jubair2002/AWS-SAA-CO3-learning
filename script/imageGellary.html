<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    h1 {
      text-align: center;
      padding: 20px;
      background: #222;
      margin: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    .footer {
      text-align: center;
      padding: 15px;
      background: #222;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

<h1> Image Gallery</h1>

<div class="gallery">

  <!-- Heavy images (4K / large resolution) -->
  <img src="https://picsum.photos/4000/3000?random=1" alt="Random image 1">
  <img src="https://picsum.photos/4000/3000?random=2" alt="Random image 2">
  <img src="https://picsum.photos/4000/3000?random=3" alt="Random image 3">
  <img src="https://picsum.photos/4000/3000?random=4" alt="Random image 4">
  <img src="https://picsum.photos/4000/3000?random=5" alt="Random image 5">
  <img src="https://picsum.photos/4000/3000?random=6" alt="Random image 6">
  <img src="https://picsum.photos/4000/3000?random=7" alt="Random image 7">
  <img src="https://picsum.photos/4000/3000?random=8" alt="Random image 8">
  <img src="https://picsum.photos/4000/3000?random=9" alt="Random image 9">
  <img src="https://picsum.photos/4000/3000?random=10" alt="Random image 10">

</div>
</body>
</html>
